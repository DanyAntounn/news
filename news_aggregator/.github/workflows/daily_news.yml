name: Daily News Digest

on:
  schedule:
    # Run daily at 7:00 AM UTC (adjust time below)
    - cron: '0 7 * * *'
  
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  send-news-digest:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the code from GitHub
      - uses: actions/checkout@v4.1.1
      
      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.11'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Step 4: Create .env file from secrets
      - name: Create .env file
        run: |
          cat > .env << EOF
          NEWSAPI_KEY=${{ secrets.NEWSAPI_KEY }}
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD=${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL=${{ secrets.RECIPIENT_EMAIL }}
          NEWS_TOPIC=${{ secrets.NEWS_TOPIC }}
          DAILY_HOUR=7
          DAILY_MINUTE=0
          EOF
      
      # Step 5: Run the news digest sender
      - name: Send news digest
        run: |
          python -c "
          from news_fetcher import NewsFetcher
          from email_sender import EmailSender
          import os
          from dotenv import load_dotenv
          
          load_dotenv()
          
          # Fetch articles
          fetcher = NewsFetcher()
          articles = fetcher.fetch_articles(
              query=os.getenv('NEWS_TOPIC'),
              page_size=15
          )
          
          print(f'Found {len(articles)} articles')
          
          # Send email
          mailer = EmailSender()
          mailer.send_email(
              recipient_email=os.getenv('RECIPIENT_EMAIL'),
              articles=articles,
              topic=os.getenv('NEWS_TOPIC')
          )
          "
      
      # Step 6: Log success
      - name: Log completion
        if: success()
        run: echo "✓ News digest sent successfully!"
      
      # Step 7: Log failure
      - name: Log failure
        if: failure()
        run: echo "✗ News digest failed"
