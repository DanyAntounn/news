name: Daily News Digest

on:
  schedule:
    # Run daily at 6:00 AM Lebanon time (adjust time below)
    - cron: '0 2 * * *'
  
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  send-news-digest:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the code from GitHub
      - uses: actions/checkout@v4.1.1
      
      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.11'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r news_aggregator/requirements.txt
      
      # Step 4: Run the news digest sender
      - name: Send news digest
        working-directory: news_aggregator
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          NEWS_TOPIC: ${{ secrets.NEWS_TOPIC }}
          NEWS_KEYWORDS: ${{ secrets.NEWS_KEYWORDS }}
        run: |
          python -c "
          from rss_fetcher import RSSNewsFetcher
          from email_sender import EmailSender
          import os
          
          # Fetch articles from RSS feeds
          fetcher = RSSNewsFetcher()
          keywords_str = os.getenv('NEWS_KEYWORDS')
          keywords = [kw.strip() for kw in keywords_str.split(',')] if keywords_str else None
          
          articles = fetcher.search_articles(
              query=os.getenv('NEWS_TOPIC', ''),
              keywords=keywords,
              limit=15
          )
          
          print(f'Found {len(articles)} articles')
          
          # Send email to multiple recipients
          mailer = EmailSender()
          recipient_emails = [email.strip() for email in os.getenv('RECIPIENT_EMAILS', '').split(',') if email.strip()]
          mailer.send_email(
              recipient_emails=recipient_emails,
              articles=articles,
              topic=os.getenv('NEWS_TOPIC', 'world')
          )
          "
      
      # Step 6: Log success
      - name: Log completion
        if: success()
        run: echo "✓ News digest sent successfully!"
      
      # Step 7: Log failure
      - name: Log failure
        if: failure()
        run: echo "✗ News digest failed"
